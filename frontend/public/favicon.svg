<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="metalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B6F47;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#A0826D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B5D54;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feFlood flood-color="#000000" flood-opacity="0.3"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="url(#metalGradient)" filter="url(#shadow)" />
  
  <!-- AE ligature in cursive style -->
  <path d="M 25 35 Q 30 25, 40 30 Q 50 35, 45 50 Q 40 65, 35 70 Q 30 75, 25 70 M 45 35 Q 55 25, 65 30 Q 75 35, 70 50 Q 65 65, 60 70 Q 55 75, 50 70" 
        stroke="#FFFFFF" 
        stroke-width="3" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        opacity="0.9"/>
  
  <!-- Highlight effect -->
  <ellipse cx="35" cy="30" rx="15" ry="8" fill="rgba(255,255,255,0.3)" transform="rotate(-20 35 30)" />
</svg>
